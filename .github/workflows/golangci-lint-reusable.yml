---
name: Reusable golangci-lint Workflow

on:
  workflow_call:
    inputs:
      go_version:
        description: 'Go version (e.g., 1.26.2). If empty, extracted from go.work or go.mod.'
        required: false
        type: string
        default: ''
      golangci_lint_version:
        description: 'golangci-lint version (e.g., v2.11.4 or latest)'
        required: false
        type: string
        default: 'latest'
      args:
        description: 'Extra arguments for golangci-lint run'
        required: false
        type: string
        default: '--timeout=10m'
      working_directory:
        description: 'Working directory for single-module repos (ignored when go.work is present)'
        required: false
        type: string
        default: '.'
      cache_dependency_path:
        description: 'Glob or path for go.sum files used by setup-go cache'
        required: false
        type: string
        default: '**/go.sum'
      runner:
        description: 'Runner for the lint job'
        required: false
        type: string
        default: 'ubuntu-latest'

permissions:
  contents: read
  pull-requests: read

jobs:
  discover:
    name: Discover modules
    runs-on: ${{ inputs.runner }}
    outputs:
      go_version: ${{ steps.resolve.outputs.go_version }}
      modules: ${{ steps.resolve.outputs.modules }}
    steps:
      - uses: actions/checkout@v5

      - name: Resolve Go version and modules
        id: resolve
        run: |
          set -euo pipefail

          if [ -n "${{ inputs.go_version }}" ]; then
            GO_VERSION="${{ inputs.go_version }}"
          elif [ -f go.work ]; then
            GO_VERSION=$(awk 'NR==1 && $1=="go" {print $2; exit}' go.work)
          elif [ -f "${{ inputs.working_directory }}/go.mod" ]; then
            GO_VERSION=$(awk '$1=="go" {print $2; exit}' "${{ inputs.working_directory }}/go.mod")
          else
            echo "No go.work or go.mod found" >&2
            exit 1
          fi
          echo "go_version=$GO_VERSION" >> "$GITHUB_OUTPUT"

          if [ -f go.work ]; then
            # Extract `use ./path` and multi-line `use ( ... )` blocks
            MODS=$(awk '
              /^use \(/ {inblock=1; next}
              inblock && /^\)/ {inblock=0; next}
              /^use / {print $2; next}
              inblock && NF {print $1}
            ' go.work | jq -R . | jq -sc .)
          else
            MODS=$(printf '%s\n' "${{ inputs.working_directory }}" | jq -R . | jq -sc .)
          fi
          echo "modules=$MODS" >> "$GITHUB_OUTPUT"
          echo "Linting modules: $MODS"

  lint:
    name: Lint (${{ matrix.module }})
    runs-on: ${{ inputs.runner }}
    needs: discover
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.discover.outputs.modules) }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ needs.discover.outputs.go_version }}
          cache-dependency-path: ${{ inputs.cache_dependency_path }}

      - uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ inputs.golangci_lint_version }}
          args: ${{ inputs.args }}
          working-directory: ${{ matrix.module }}
          only-new-issues: ${{ github.event_name == 'pull_request' }}
