---
name: Reusable Docker CI/CD Workflow

on:
  workflow_call:
    secrets:
      DOCKER_HUB_USERNAME:
        description: 'Docker Hub username'
        required: false
      DOCKER_HUB_PASSWORD:
        description: 'Docker Hub password/token'
        required: false
    inputs:
      # Application configuration
      app_name:
        description: 'Application name'
        required: true
        type: string
      dockerhub_image:
        description: 'Docker Hub image name (e.g., maclucky/app-name)'
        required: true
        type: string
      ghcr_image:
        description: 'GHCR image name (e.g., ghcr.io/mac-lucky/app-name)'
        required: true
        type: string
      
      # Version checking configuration
      upstream_repo:
        description: 'Upstream GitHub repository for version checking (e.g., caddyserver/caddy, tailscale/tailscale)'
        required: false
        type: string
        default: ''
      version_strip_prefix:
        description: 'Prefix to strip from version tags (e.g., "v" for v2.8.4 -> 2.8.4)'
        required: false
        type: string
        default: 'v'
      build_arg_name:
        description: 'Build argument name for version (e.g., CADDY_VERSION, DERP_VERSION)'
        required: false
        type: string
        default: ''
      
      # Build configuration
      dockerfile_path:
        description: 'Path to Dockerfile'
        required: false
        type: string
        default: './Dockerfile'
      build_context:
        description: 'Build context path'
        required: false
        type: string
        default: '.'
      platforms:
        description: 'Target platforms for multi-arch build'
        required: false
        type: string
        default: 'linux/amd64,linux/arm64'
      
      # Trigger configuration
      enable_version_check:
        description: 'Enable upstream version checking and BUILD_NEEDED logic'
        required: false
        type: boolean
        default: false
      enable_schedule_build:
        description: 'Enable builds on schedule triggers'
        required: false
        type: boolean
        default: true
      force_build:
        description: 'Force build regardless of version check'
        required: false
        type: boolean
        default: false
      
      # Security and quality
      enable_security_scan:
        description: 'Enable security scanning with Grype'
        required: false
        type: boolean
        default: true
      scan_severity_cutoff:
        description: 'Grype severity at/above which findings count (negligible|low|medium|high|critical)'
        required: false
        type: string
        default: 'high'
      scan_only_fixed:
        description: 'Only gate on vulnerabilities that have a fix available'
        required: false
        type: boolean
        default: true
      scan_fail_build:
        description: 'Fail the build (block the push) when the image scan finds gating vulnerabilities'
        required: false
        type: boolean
        default: true
      govulncheck_binary:
        description: 'Path to an upstream Go binary inside the image to reachability-scan with govulncheck (e.g. /usr/bin/caddy); empty disables it'
        required: false
        type: string
        default: ''

      # Deployment
      push_to_dockerhub:
        description: 'Push images to Docker Hub (in addition to GHCR)'
        required: false
        type: boolean
        default: false

env:
  REGISTRY_IMAGE_DOCKERHUB: ${{ inputs.dockerhub_image }}
  REGISTRY_IMAGE_GHCR: ${{ inputs.ghcr_image }}

jobs:
  # Job 1: Version Check and Build Decision
  version-check:
    name: Version Check and Build Decision
    runs-on: ubuntu-latest
    outputs:
      build-needed: ${{ steps.check.outputs.build-needed }}
      upstream-version: ${{ steps.check.outputs.upstream-version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Check if build is needed
        id: check
        run: |
          BUILD_NEEDED="false"
          UPSTREAM_VERSION=""

          # Never push images for pull requests
          if [ "${{ github.event_name }}" = "pull_request" ] || [ "${{ github.event_name }}" = "pull_request_target" ]; then
            echo "🔍 Pull request - no image push needed"
            BUILD_NEEDED="false"
          # Force build for manual triggers or when version check is disabled
          elif [ "${{ inputs.force_build }}" = "true" ] || [ "${{ inputs.enable_version_check }}" = "false" ]; then
            echo "🔨 Force build enabled or version check disabled"
            BUILD_NEEDED="true"
          # For workflow_dispatch, always build unless version check explicitly prevents it
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "🔨 Manual workflow dispatch - building"
            BUILD_NEEDED="true"
            
            # Check if version already exists (for informational purposes only)
            if [ "${{ inputs.enable_version_check }}" = "true" ] && [ -n "${{ inputs.upstream_repo }}" ]; then
              UPSTREAM_VERSION=$(curl -s -H "Authorization: Bearer ${{ github.token }}" "https://api.github.com/repos/${{ inputs.upstream_repo }}/releases/latest" | jq -r .tag_name)
              if [ "$UPSTREAM_VERSION" = "null" ] || [ -z "$UPSTREAM_VERSION" ]; then
                echo "⚠️ Failed to get upstream version - API may be rate limited"
                UPSTREAM_VERSION=""
              elif [ -n "${{ inputs.version_strip_prefix }}" ]; then
                UPSTREAM_VERSION=$(echo "$UPSTREAM_VERSION" | sed "s/^${{ inputs.version_strip_prefix }}//")
              fi
              
              # Check if this version already exists in GHCR
              IMAGE_NAME=$(echo "${{ inputs.ghcr_image }}" | sed 's|.*/||')
              OWNER=$(echo "${{ inputs.ghcr_image }}" | sed 's|ghcr.io/||' | sed 's|/.*||')

              EXISTING_VERSION=$(curl -s \
                -H "Authorization: Bearer ${{ github.token }}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/users/$OWNER/packages/container/$IMAGE_NAME/versions?per_page=100" | \
                jq -r '.[].metadata.container.tags[]' | grep "^${UPSTREAM_VERSION}$" || echo "")

              if [ -n "$EXISTING_VERSION" ]; then
                echo "ℹ️ Note: Version $UPSTREAM_VERSION already exists in GHCR, but building anyway due to manual trigger"
              else
                echo "ℹ️ Version $UPSTREAM_VERSION not found in GHCR - new build"
              fi
            fi
          # For push events (not on workflow changes), build
          elif [ "${{ github.event_name }}" = "push" ]; then
            echo "🔨 Push event - building"
            BUILD_NEEDED="true"

            # Get upstream version if configured
            if [ "${{ inputs.enable_version_check }}" = "true" ] && [ -n "${{ inputs.upstream_repo }}" ]; then
              UPSTREAM_VERSION=$(curl -s -H "Authorization: Bearer ${{ github.token }}" "https://api.github.com/repos/${{ inputs.upstream_repo }}/releases/latest" | jq -r .tag_name)
              if [ "$UPSTREAM_VERSION" = "null" ] || [ -z "$UPSTREAM_VERSION" ]; then
                echo "⚠️ Failed to get upstream version - API may be rate limited"
                UPSTREAM_VERSION=""
              elif [ -n "${{ inputs.version_strip_prefix }}" ]; then
                UPSTREAM_VERSION=$(echo "$UPSTREAM_VERSION" | sed "s/^${{ inputs.version_strip_prefix }}//")
              fi
              if [ -n "$UPSTREAM_VERSION" ]; then
                echo "🔍 Latest upstream version: $UPSTREAM_VERSION"
              fi
            fi
          # For schedule events, check if we should build
          elif [ "${{ github.event_name }}" = "schedule" ] && [ "${{ inputs.enable_schedule_build }}" = "true" ]; then
            if [ "${{ inputs.enable_version_check }}" = "true" ] && [ -n "${{ inputs.upstream_repo }}" ]; then
              echo "📅 Schedule event with version check enabled"

              # Get latest version from upstream
              UPSTREAM_VERSION=$(curl -s -H "Authorization: Bearer ${{ github.token }}" "https://api.github.com/repos/${{ inputs.upstream_repo }}/releases/latest" | jq -r .tag_name)
              if [ "$UPSTREAM_VERSION" = "null" ] || [ -z "$UPSTREAM_VERSION" ]; then
                echo "⚠️ Failed to get upstream version - API may be rate limited"
                echo "⏭️ Skipping build due to version fetch failure"
                BUILD_NEEDED="false"
              elif [ -n "${{ inputs.version_strip_prefix }}" ]; then
                UPSTREAM_VERSION=$(echo "$UPSTREAM_VERSION" | sed "s/^${{ inputs.version_strip_prefix }}//")
              fi

              if [ -n "$UPSTREAM_VERSION" ]; then
                echo "🔍 Latest upstream version: $UPSTREAM_VERSION"

                # Check if this version already exists in GHCR
                IMAGE_NAME=$(echo "${{ inputs.ghcr_image }}" | sed 's|.*/||')
                OWNER=$(echo "${{ inputs.ghcr_image }}" | sed 's|ghcr.io/||' | sed 's|/.*||')

                EXISTING_VERSION=$(curl -s \
                  -H "Authorization: Bearer ${{ github.token }}" \
                  -H "Accept: application/vnd.github+json" \
                  "https://api.github.com/users/$OWNER/packages/container/$IMAGE_NAME/versions?per_page=100" | \
                  jq -r '.[].metadata.container.tags[]' | grep "^${UPSTREAM_VERSION}$" || echo "")

                if [ -z "$EXISTING_VERSION" ]; then
                  echo "✅ Version $UPSTREAM_VERSION not found in GHCR - build needed"
                  BUILD_NEEDED="true"
                else
                  echo "⏭️ Version $UPSTREAM_VERSION already exists in GHCR - skipping build"
                  BUILD_NEEDED="false"
                fi
              fi
            else
              echo "🔨 Schedule event without version check - building"
              BUILD_NEEDED="true"
            fi
          else
            echo "⏭️ No build trigger conditions met"
            BUILD_NEEDED="false"
          fi
          
          echo "build-needed=${BUILD_NEEDED}" >> $GITHUB_OUTPUT
          echo "upstream-version=${UPSTREAM_VERSION}" >> $GITHUB_OUTPUT
          echo "BUILD_NEEDED=${BUILD_NEEDED}" >> $GITHUB_ENV
          echo "UPSTREAM_VERSION=${UPSTREAM_VERSION}" >> $GITHUB_ENV

  # Job 2: Build platform-specific images in parallel
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs: version-check
    if: ${{ needs.version-check.outputs.build-needed == 'true' }}
    permissions:
      contents: write
      packages: write
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Prepare platform pair
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: ${{ inputs.push_to_dockerhub }}
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Prepare build variables
        id: vars
        run: |
          # Determine version to use
          if [ -n "${{ needs.version-check.outputs.upstream-version }}" ]; then
            VERSION="${{ needs.version-check.outputs.upstream-version }}"
            echo "🏷️ Using upstream version: $VERSION"
          else
            # Fallback to latest or git tag
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "latest")
            echo "🏷️ Using fallback version: $VERSION"
          fi

          echo "VERSION=${VERSION}" >> $GITHUB_ENV

          # Prepare build args
          BUILD_ARGS=""
          if [ -n "${{ inputs.build_arg_name }}" ] && [ -n "$VERSION" ]; then
            BUILD_ARGS="${{ inputs.build_arg_name }}=${VERSION}"
            echo "🔧 Build arg: $BUILD_ARGS"
          fi
          echo "BUILD_ARGS=${BUILD_ARGS}" >> $GITHUB_ENV

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE_GHCR }}
          tags: |
            type=raw,value=${{ env.VERSION }}
            type=raw,value=latest

      # Build this single arch into the local daemon so it can be scanned before
      # anything is pushed. A single-platform build supports load:true (a multi-platform
      # one does not). This also warms the gha cache (mode=max) for the push build below.
      - name: Build image for scan
        id: build-local
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.build_context }}
          file: ${{ inputs.dockerfile_path }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ env.BUILD_ARGS }}
          load: true
          push: false
          tags: ${{ inputs.app_name }}:scan-${{ env.PLATFORM_PAIR }}
          cache-from: type=gha,scope=build-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,scope=build-${{ env.PLATFORM_PAIR }},mode=max

      # Build the effective Grype config: the org-wide ignore baseline, plus (for Go
      # binaries) automatic reachability suppression from govulncheck VEX. Fail-safe -
      # any error here leaves a valid empty config so the scan still runs.
      - name: Prepare Grype policy
        if: ${{ inputs.enable_security_scan }}
        shell: bash
        env:
          GOVULN_BINARY: ${{ inputs.govulncheck_binary }}
          SCAN_IMAGE: ${{ inputs.app_name }}:scan-${{ env.PLATFORM_PAIR }}
        run: |
          set +e
          POLICY_URL="https://raw.githubusercontent.com/mac-lucky/actions-shared-workflows/master/security/grype-base-policy.yaml"
          if curl -sSfL "$POLICY_URL" -o ./.grype.yaml && [ -s ./.grype.yaml ]; then
            echo "Loaded org Grype baseline policy"
          else
            printf 'ignore: []\n' > ./.grype.yaml
            echo "WARN: org policy unavailable; starting from an empty ignore set"
          fi
          if [ -n "${GOVULN_BINARY}" ]; then
            cid="$(docker create "${SCAN_IMAGE}" 2>/dev/null)"
            if [ -n "$cid" ] && docker cp "${cid}:${GOVULN_BINARY}" /tmp/govuln-bin 2>/dev/null; then
              go install golang.org/x/vuln/cmd/govulncheck@latest 2>/dev/null
              GVC="$(go env GOPATH)/bin/govulncheck"
              if [ -x "$GVC" ] && "$GVC" -mode binary -format openvex /tmp/govuln-bin > ./govulncheck.vex.json 2>/dev/null && [ -s ./govulncheck.vex.json ]; then
                printf 'vex-documents:\n  - ./govulncheck.vex.json\n' >> ./.grype.yaml
                echo "Added govulncheck reachability VEX for ${GOVULN_BINARY}"
              else
                echo "WARN: govulncheck produced no VEX; skipping reachability layer"
              fi
            else
              echo "WARN: could not extract ${GOVULN_BINARY} from image; skipping reachability layer"
            fi
            [ -n "$cid" ] && docker rm "$cid" >/dev/null 2>&1
          fi
          if ! python3 -c "import yaml; yaml.safe_load(open('./.grype.yaml'))" 2>/dev/null; then
            echo "WARN: generated .grype.yaml is invalid; resetting to empty ignore set"
            printf 'ignore: []\n' > ./.grype.yaml
          fi
          echo "----- effective .grype.yaml -----"
          cat ./.grype.yaml
          exit 0

      # Scan the built image. With fail-build:true this fails the job on a gating
      # finding, so the push step below never runs and merge (needs: build) is skipped.
      - name: Container security scan (Grype)
        id: scan
        if: ${{ inputs.enable_security_scan }}
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7
        with:
          image: ${{ inputs.app_name }}:scan-${{ env.PLATFORM_PAIR }}
          severity-cutoff: ${{ inputs.scan_severity_cutoff }}
          only-fixed: ${{ inputs.scan_only_fixed }}
          fail-build: ${{ inputs.scan_fail_build }}

      - name: Upload scan SARIF
        if: ${{ inputs.enable_security_scan && always() && steps.scan.outputs.sarif != '' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
          category: grype-${{ env.PLATFORM_PAIR }}

      # Cache hit from the scan build above; this only exports/pushes layers by digest.
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.build_context }}
          file: ${{ inputs.dockerfile_path }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ env.BUILD_ARGS }}
          outputs: type=image,name=${{ env.REGISTRY_IMAGE_GHCR }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=build-${{ env.PLATFORM_PAIR }}

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # Job 3: Merge platform-specific images into multi-arch manifest
  merge:
    name: Create Multi-arch Manifest
    runs-on: ubuntu-latest
    needs: [version-check, build]
    if: ${{ needs.version-check.outputs.build-needed == 'true' }}
    permissions:
      contents: write
      packages: write
      security-events: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare version
        id: vars
        run: |
          if [ -n "${{ needs.version-check.outputs.upstream-version }}" ]; then
            VERSION="${{ needs.version-check.outputs.upstream-version }}"
          else
            VERSION="latest"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE_GHCR }}
          tags: |
            type=raw,value=${{ env.VERSION }}
            type=raw,value=latest

      - name: Log in to Docker Hub
        if: ${{ inputs.push_to_dockerhub }}
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Create manifest list and push (GHCR)
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY_IMAGE_GHCR }}@sha256:%s ' *)

      - name: Create manifest list and push (Docker Hub)
        if: ${{ inputs.push_to_dockerhub }}
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            -t ${{ env.REGISTRY_IMAGE_DOCKERHUB }}:${{ env.VERSION }} \
            -t ${{ env.REGISTRY_IMAGE_DOCKERHUB }}:latest \
            $(printf '${{ env.REGISTRY_IMAGE_GHCR }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY_IMAGE_GHCR }}:${{ env.VERSION }}

      - name: Generate image SBOM (Syft)
        if: ${{ inputs.enable_security_scan }}
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: '${{ env.REGISTRY_IMAGE_GHCR }}:${{ env.VERSION }}'
          format: spdx-json
          output-file: image-sbom.spdx.json
          upload-artifact: false

      # The image is vuln-scanned per-arch in the build job before push (see build job);
      # here we only preserve the final multi-arch SBOM as a supply-chain artifact.
      - name: Upload SBOM artifact
        if: ${{ inputs.enable_security_scan }}
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: image-sbom.spdx.json
          retention-days: 7

  # Job 4: Post-deployment verification
  post-deploy-verify:
    name: Post-deployment Verification
    runs-on: ubuntu-latest
    needs: [version-check, merge]
    if: ${{ needs.version-check.outputs.build-needed == 'true' }}
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Verify image pull and functionality
        run: |
          echo "Verifying images can be pulled from GHCR..."
          docker pull ${{ env.REGISTRY_IMAGE_GHCR }}:latest

          echo "✅ Image verification successful"
